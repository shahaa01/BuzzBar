  /api/v1/admin/promotions:
    get:
      tags: [AdminPromotions]
      summary: List promotions for admin panel operations
      description: |
        Promotions list for Phase 2E foundations.
        Employees can read the list; Admin and SuperAdmin use the same list with write actions elsewhere.
        Search matches promo code and optional title. `state` is derived from `isActive`, `startAt`, and `endAt`.
      security: [{ AdminBearerAuth: [] }]
      parameters:
        - in: query
          name: q
          required: false
          schema: { type: string }
        - in: query
          name: type
          required: false
          schema: { type: string, enum: [PERCENT, FLAT, all], default: all }
        - in: query
          name: isActive
          required: false
          schema: { type: string, enum: [active, inactive, all], default: all }
        - in: query
          name: state
          required: false
          schema: { type: string, enum: [live, scheduled, expired, inactive, all], default: all }
        - in: query
          name: from
          required: false
          schema: { type: string, format: date }
        - in: query
          name: to
          required: false
          schema: { type: string, format: date }
        - in: query
          name: sort
          required: false
          schema: { type: string, enum: [createdAt_desc, createdAt_asc, updatedAt_desc, startsAt_asc, endsAt_asc, usageCount_desc], default: createdAt_desc }
        - in: query
          name: page
          required: false
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          required: false
          schema: { type: integer, enum: [20, 50, 100], default: 20 }
      responses:
        "200":
          description: OK
        "400":
          description: INVALID_LIMIT | INVALID_DATE
        "403":
          description: ADMIN_FORBIDDEN
    post:
      tags: [AdminPromotions]
      summary: Create promotion
      description: |
        Admin/SuperAdmin-only promo creation endpoint used by the 2E.2 editor.
        Validates code uniqueness, schedule window, numeric constraints, and eligibility ids.
      security: [{ AdminBearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, title, type, value, startAt, endAt, isActive]
              properties:
                code: { type: string }
                title: { type: string }
                description: { type: string, nullable: true }
                type: { type: string, enum: [PERCENT, FLAT] }
                value: { type: integer }
                minSubtotal: { type: integer, nullable: true }
                maxDiscount: { type: integer, nullable: true }
                usageLimitTotal: { type: integer, nullable: true }
                usageLimitPerUser: { type: integer, nullable: true }
                startAt: { type: string, format: date-time }
                endAt: { type: string, format: date-time }
                isActive: { type: boolean }
                eligibleCategoryIds:
                  type: array
                  items: { type: string }
                eligibleBrandIds:
                  type: array
                  items: { type: string }
                eligibleProductIds:
                  type: array
                  items: { type: string }
                excludeDiscountedItems: { type: boolean }
      responses:
        "201":
          description: Created
        "400":
          description: VALIDATION_ERROR | INVALID_ID
        "403":
          description: ADMIN_FORBIDDEN
        "409":
          description: PROMO_CODE_ALREADY_EXISTS

  /api/v1/admin/promotions/{id}:
    get:
      tags: [AdminPromotions]
      summary: Get promotion detail
      description: |
        Returns the operator-facing promo detail read model used by the detail/editor surfaces.
        Includes:
        - core rule fields (`code`, `title`, `type`, `value`, `status`, schedule)
        - `eligibilitySummary` with readable sentence blocks and resolved category/brand/product references
        - `usageSummary` with total redemptions, remaining uses, per-user limit, and exhausted state
        - `validation` with `liveValidityStatus`, warnings, checkout hints, and invalid configuration reasons
        - `linkedBusinessRules` with min subtotal, max discount, excluded discounted items, and resolved restrictions
      security: [{ AdminBearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
        "404":
          description: NOT_FOUND
        "403":
          description: ADMIN_FORBIDDEN
    put:
      tags: [AdminPromotions]
      summary: Update promotion
      description: |
        Admin/SuperAdmin-only promo update endpoint used by the 2E.2 editor.
        Uses the same validation contract as create and fully rewrites the promo rule surface.
      security: [{ AdminBearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, title, type, value, startAt, endAt, isActive]
              properties:
                code: { type: string }
                title: { type: string }
                description: { type: string, nullable: true }
                type: { type: string, enum: [PERCENT, FLAT] }
                value: { type: integer }
                minSubtotal: { type: integer, nullable: true }
                maxDiscount: { type: integer, nullable: true }
                usageLimitTotal: { type: integer, nullable: true }
                usageLimitPerUser: { type: integer, nullable: true }
                startAt: { type: string, format: date-time }
                endAt: { type: string, format: date-time }
                isActive: { type: boolean }
                eligibleCategoryIds:
                  type: array
                  items: { type: string }
                eligibleBrandIds:
                  type: array
                  items: { type: string }
                eligibleProductIds:
                  type: array
                  items: { type: string }
                excludeDiscountedItems: { type: boolean }
      responses:
        "200":
          description: OK
        "400":
          description: VALIDATION_ERROR | INVALID_ID
        "403":
          description: ADMIN_FORBIDDEN
        "404":
          description: NOT_FOUND
        "409":
          description: PROMO_CODE_ALREADY_EXISTS
    delete:
      tags: [AdminPromotions]
      summary: Deactivate promotion
      description: |
        Admin/SuperAdmin-only deactivation endpoint used by the promotions list/detail surfaces.
        This sets `isActive=false`; it does not delete the promotion document.
      security: [{ AdminBearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
        "404":
          description: NOT_FOUND
        "403":
          description: ADMIN_FORBIDDEN

  /api/v1/admin/payments:
    get:
      tags: [AdminPayments]
      summary: List payment transactions
      description: |
        Admin/SuperAdmin-only payments list used by the operational payments module.
        Supports server-side filtering, sorting, pagination, and order/user search.
        `q` matches payment transaction id, provider reference, order number, and user identity fields.
        `stalePending=true` limits results to wallet transactions still pending beyond the configured timeout window.
      security: [{ AdminBearerAuth: [] }]
      parameters:
        - in: query
          name: provider
          required: false
          schema: { type: string, enum: [MOCK, ESEWA, KHALTI] }
        - in: query
          name: status
          required: false
          schema: { type: string, enum: [INITIATED, PENDING, SUCCESS, FAILED] }
        - in: query
          name: paymentMethod
          required: false
          schema: { type: string, enum: [COD, WALLET] }
        - in: query
          name: from
          required: false
          schema: { type: string, format: date-time }
        - in: query
          name: to
          required: false
          schema: { type: string, format: date-time }
        - in: query
          name: q
          required: false
          schema: { type: string }
        - in: query
          name: stalePending
          required: false
          schema: { type: boolean }
        - in: query
          name: sort
          required: false
          schema: { type: string, enum: [createdAt_desc, createdAt_asc, amount_desc, amount_asc, updatedAt_desc], default: createdAt_desc }
        - in: query
          name: page
          required: false
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          required: false
          schema: { type: integer, enum: [20, 50, 100], default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            _id: { type: string }
                            provider: { type: string, enum: [MOCK, ESEWA, KHALTI] }
                            paymentMethod: { type: string, enum: [COD, WALLET] }
                            status: { type: string, enum: [INITIATED, PENDING, SUCCESS, FAILED] }
                            amount: { type: integer }
                            currency: { type: string }
                            providerReference: { type: string, nullable: true }
                            createdAt: { type: string, format: date-time }
                            updatedAt: { type: string, format: date-time }
                            isMock: { type: boolean }
                            finality: { type: string, enum: [FINAL, OPEN] }
                            stalePending: { type: boolean }
                            order:
                              type: object
                              nullable: true
                              properties:
                                id: { type: string, nullable: true }
                                orderNumber: { type: string, nullable: true }
                                status: { type: string, nullable: true }
                                paymentStatus: { type: string, nullable: true }
                                total: { type: integer, nullable: true }
                            user:
                              type: object
                              nullable: true
                              properties:
                                id: { type: string, nullable: true }
                                email: { type: string, nullable: true }
                                phone: { type: string, nullable: true }
                                name: { type: string, nullable: true }
                      page: { type: integer }
                      limit: { type: integer }
                      total: { type: integer }
        "400":
          description: INVALID_LIMIT | INVALID_DATE
        "403":
          description: ADMIN_FORBIDDEN

  /api/v1/admin/payments/{id}:
    get:
      tags: [AdminPayments]
      summary: Get payment transaction
      description: |
        Admin/SuperAdmin-only structured payment detail read model.
        Includes linked order/user context, normalized request/response snapshots,
        failure diagnostics, and mock lifecycle data when the provider is `MOCK`.
      security: [{ AdminBearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      payment:
                        type: object
                        properties:
                          id: { type: string }
                          provider: { type: string, enum: [MOCK, ESEWA, KHALTI] }
                          paymentMethod: { type: string, enum: [COD, WALLET] }
                          status: { type: string, enum: [INITIATED, PENDING, SUCCESS, FAILED] }
                          amount: { type: integer }
                          currency: { type: string }
                          providerReference: { type: string, nullable: true }
                          failureReason: { type: string, nullable: true }
                          createdAt: { type: string, format: date-time }
                          updatedAt: { type: string, format: date-time }
                          isMock: { type: boolean }
                          isFinal: { type: boolean }
                      order:
                        type: object
                        nullable: true
                        properties:
                          id: { type: string }
                          orderNumber: { type: string }
                          status: { type: string }
                          paymentMethod: { type: string, enum: [COD, WALLET] }
                          paymentStatus: { type: string }
                          total: { type: integer }
                          createdAt: { type: string, format: date-time, nullable: true }
                      user:
                        type: object
                        nullable: true
                        properties:
                          id: { type: string }
                          email: { type: string, nullable: true }
                          phone: { type: string, nullable: true }
                          name: { type: string, nullable: true }
                      snapshots:
                        type: object
                        properties:
                          request: { nullable: true }
                          response: { nullable: true }
                      diagnostics:
                        type: object
                        properties:
                          failureReason: { type: string, nullable: true }
                          requestId: { type: string, nullable: true }
                          operatorHint: { type: string, nullable: true }
                          stalePending: { type: boolean }
                          pendingAgeMinutes: { type: integer, nullable: true }
                          providerResult: { type: string, nullable: true }
                          mockLifecycle:
                            type: object
                            nullable: true
                            properties:
                              providerPath: { type: string }
                              steps:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id: { type: string, enum: [INIT_REQUESTED, INIT_SUCCESS, CONFIRM_REQUESTED, CONFIRM_PENDING, CONFIRM_SUCCESS, CONFIRM_FAILED] }
                                    label: { type: string }
                                    at: { type: string, format: date-time }
                                    state: { type: string, enum: [done, pending, failed] }
        "404":
          description: NOT_FOUND
        "403":
          description: ADMIN_FORBIDDEN

components:
  securitySchemes:
    UserBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    AdminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string }
        errorCode: { type: string }
        details: { nullable: true }
        requestId: { type: string }

    UserPublic:
      type: object
      properties:
        id: { type: string }
        email: { type: string, nullable: true }
        emailVerified: { type: boolean }
        phone: { type: string, nullable: true }
        name: { type: string, nullable: true }
        photoUrl: { type: string, nullable: true }
        kycStatus: { type: string, enum: [not_started, pending, verified, rejected] }

    AuthSignupRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        name: { type: string }

    AuthLoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    AuthResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            token: { type: string }
            refreshToken: { type: string }
            user: { $ref: "#/components/schemas/UserPublic" }

    MeUpdateRequest:
      type: object
      properties:
        name: { type: string }
        phone: { type: string }
        photoUrl: { type: string }

    CartAddItemRequest:
      type: object
      required: [variantId, qty]
      properties:
        variantId: { type: string }
        qty: { type: integer, minimum: 1 }

    CartUpdateItemRequest:
      type: object
      required: [qty]
      properties:
        qty: { type: integer, minimum: 0 }

    PromoValidateRequest:
      type: object
      required: [code]
      properties:
        code: { type: string }

    KycSubmitRequest:
      type: object
      required: [idFront]
      properties:
        idFront:
          type: string
          format: binary
        idBack:
          type: string
          format: binary
        selfie:
          type: string
          format: binary
        clientOcrText: { type: string }
        clientDobRaw: { type: string }
        clientConfidence: { type: number }

    OrderCreateRequest:
      type: object
      required: [paymentMethod, address]
      properties:
        paymentMethod: { type: string, enum: [COD, WALLET] }
        promoCode: { type: string }
        address:
          type: object
          required: [fullAddress, area]
          properties:
            label: { type: string }
            fullAddress: { type: string }
            area: { type: string }
            landmark: { type: string }
            lat: { type: number }
            lng: { type: number }
            contactName: { type: string }
            contactPhone: { type: string }

    PaymentInitRequest:
      type: object
      required: [orderId, provider]
      properties:
        orderId: { type: string }
        provider: { type: string, example: MOCK }

    PaymentConfirmRequest:
      type: object
      required: [orderId, provider]
      properties:
        orderId: { type: string }
        provider: { type: string, example: MOCK }
        payload: { nullable: true }

    AdminLoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    AdminSettingsUpdateRequest:
      type: object
      properties:
        nightHours:
          type: object
          properties:
            start: { type: string, example: "22:00" }
            end: { type: string, example: "06:00" }
            timezone: { type: string, example: "Asia/Kathmandu" }
        serviceAreas:
          type: array
          items: { type: string }
        deliveryFeeFlat: { type: integer }
        legalAgeMin: { type: integer }
