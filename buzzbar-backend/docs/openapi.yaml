openapi: 3.0.3
info:
  title: BuzzBar Backend API
  version: "1.0.0"
  description: |
    Dev Phase 1 API (stable).

    Stability guarantee:
    - `/api/v1/**` is considered stable after Phase 1.
    - Future changes must be additive only. Breaking changes require `/api/v2`.
servers:
  - url: http://localhost:3000

tags:
  - name: Health
  - name: Auth
  - name: Me
  - name: Catalog
  - name: Cart
  - name: Promotions
  - name: KYC
  - name: Orders
  - name: Payments
  - name: AdminAuth
  - name: AdminSettings
  - name: AdminCatalog
  - name: AdminUploads
  - name: AdminInventory
  - name: AdminKYC
  - name: AdminOrders
  - name: AdminPayments

paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness check
      responses:
        "200":
          description: Always OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  status: { type: string }
                  requestId: { type: string }
                  ts: { type: string }
  /ready:
    get:
      tags: [Health]
      summary: Readiness check (Mongo required)
      responses:
        "200":
          description: Ready
        "503":
          description: Not ready

  /api/v1/auth/signup:
    post:
      tags: [Auth]
      summary: Signup (password)
      description: |
        Rate limited.
        Errors: `EMAIL_TAKEN`, `AUTH_RATE_LIMITED`, `VALIDATION_ERROR`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AuthSignupRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "409":
          description: Email taken
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "429":
          description: Rate limited
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login (password)
      description: |
        Rate limited.
        Errors: `INVALID_CREDENTIALS`, `AUTH_RATE_LIMITED`, `VALIDATION_ERROR`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AuthLoginRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "429":
          description: Rate limited
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v1/auth/google:
    post:
      tags: [Auth]
      summary: Login with Google (idToken)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [idToken]
              properties:
                idToken: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }

  /api/v1/auth/apple:
    post:
      tags: [Auth]
      summary: Login with Apple (identityToken)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identityToken]
              properties:
                identityToken: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh user tokens
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string }
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout user (revoke sessions)
      security: [{ UserBearerAuth: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string }
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized

  /api/v1/me:
    get:
      tags: [Me]
      summary: Get current user profile
      security: [{ UserBearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/UserPublic" }
        "401":
          description: Unauthorized
    put:
      tags: [Me]
      summary: Update current user profile
      security: [{ UserBearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MeUpdateRequest" }
      responses:
        "200":
          description: OK

  /api/v1/categories:
    get:
      tags: [Catalog]
      summary: List active categories
      responses:
        "200":
          description: OK

  /api/v1/brands:
    get:
      tags: [Catalog]
      summary: List active brands
      responses:
        "200":
          description: OK

  /api/v1/products:
    get:
      tags: [Catalog]
      summary: List products (search/filter)
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: brand
          schema: { type: string }
        - in: query
          name: minPrice
          schema: { type: integer }
        - in: query
          name: maxPrice
          schema: { type: integer }
        - in: query
          name: inStock
          schema: { type: string, enum: ["true", "false"] }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: OK

  /api/v1/products/{id}:
    get:
      tags: [Catalog]
      summary: Product detail + variants availability
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
        "404":
          description: Not found

  /api/v1/cart:
    get:
      tags: [Cart]
      summary: Get cart (deterministic totals)
      security: [{ UserBearerAuth: [] }]
      responses:
        "200":
          description: OK

  /api/v1/cart/items:
    post:
      tags: [Cart]
      summary: Add/increment cart item
      security: [{ UserBearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CartAddItemRequest" }
      responses:
        "200":
          description: OK

  /api/v1/cart/items/{variantId}:
    patch:
      tags: [Cart]
      summary: Set cart item qty (0 removes)
      security: [{ UserBearerAuth: [] }]
      parameters:
        - in: path
          name: variantId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CartUpdateItemRequest" }
      responses:
        "200":
          description: OK
    delete:
      tags: [Cart]
      summary: Remove cart item
      security: [{ UserBearerAuth: [] }]
      parameters:
        - in: path
          name: variantId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK

  /api/v1/cart/clear:
    post:
      tags: [Cart]
      summary: Clear cart
      security: [{ UserBearerAuth: [] }]
      responses:
        "200":
          description: OK

  /api/v1/promotions/validate:
    post:
      tags: [Promotions]
      summary: Validate promo code against cart
      security: [{ UserBearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PromoValidateRequest" }
      responses:
        "200":
          description: OK

  /api/v1/kyc/submit:
    post:
      tags: [KYC]
      summary: Submit KYC attempt (multipart)
      security: [{ UserBearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: "#/components/schemas/KycSubmitRequest" }
      responses:
        "201":
          description: Created
        "400":
          description: Validation/upload error
        "501":
          description: Cloudinary not configured

  /api/v1/kyc/status:
    get:
      tags: [KYC]
      summary: Get KYC status summary
      security: [{ UserBearerAuth: [] }]
      responses:
        "200":
          description: OK

  /api/v1/orders:
    post:
      tags: [Orders]
      summary: Create order from cart (reserves stock, snapshots pricing)
      security: [{ UserBearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OrderCreateRequest" }
      responses:
        "201":
          description: Created
    get:
      tags: [Orders]
      summary: List customer orders
      security: [{ UserBearerAuth: [] }]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: OK

  /api/v1/orders/{id}:
    get:
      tags: [Orders]
      summary: Order detail
      security: [{ UserBearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
        "404":
          description: Not found

  /api/v1/payments/init:
    post:
      tags: [Payments]
      summary: Initialize wallet payment (MOCK only in P1.7a)
      security: [{ UserBearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PaymentInitRequest" }
      responses:
        "200":
          description: OK
        "409":
          description: Not applicable / terminal

  /api/v1/payments/confirm:
    post:
      tags: [Payments]
      summary: Confirm wallet payment (MOCK only in P1.7a)
      security: [{ UserBearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PaymentConfirmRequest" }
      responses:
        "200":
          description: OK
        "404":
          description: Not found

  /api/v1/admin/auth/login:
    post:
      tags: [AdminAuth]
      summary: Admin login
      description: |
        Rate limited.
        Errors: `ADMIN_INVALID_CREDENTIALS`, `ADMIN_AUTH_RATE_LIMITED`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminLoginRequest" }
      responses:
        "200":
          description: OK
        "401":
          description: Invalid credentials
        "429":
          description: Rate limited

  /api/v1/admin/auth/refresh:
    post:
      tags: [AdminAuth]
      summary: Admin token refresh
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized

  /api/v1/admin/auth/logout:
    post:
      tags: [AdminAuth]
      summary: Admin logout
      security: [{ AdminBearerAuth: [] }]
      responses:
        "200":
          description: OK

  /api/v1/admin/settings:
    get:
      tags: [AdminSettings]
      summary: Get settings
      security: [{ AdminBearerAuth: [] }]
      responses:
        "200":
          description: OK

  /api/v1/admin/categories:
    get:
      tags: [AdminCatalog]
      summary: List categories (admin)
      security: [{ AdminBearerAuth: [] }]
      parameters:
        - in: query
          name: q
          required: false
          schema: { type: string }
        - in: query
          name: isActive
          required: false
          schema: { type: string, enum: [active, inactive, all], default: all }
        - in: query
          name: page
          required: false
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          required: false
          schema: { type: integer, default: 20, enum: [20, 50, 100] }
      responses:
        "200":
          description: OK
    post:
      tags: [AdminCatalog]
      summary: Create category
      security: [{ AdminBearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                slug: { type: string }
                image: { type: object, additionalProperties: true }
                sortOrder: { type: integer }
                isActive: { type: boolean }
      responses:
        "201":
          description: Created

  /api/v1/admin/categories/{id}:
    get:
      tags: [AdminCatalog]
      summary: Get category (admin)
      security: [{ AdminBearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
    put:
      tags: [AdminCatalog]
      summary: Update category
      security: [{ AdminBearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                slug: { type: string }
                image: { type: object, nullable: true, additionalProperties: true }
                sortOrder: { type: integer }
                isActive: { type: boolean }
      responses:
        "200":
          description: OK
        "409":
          description: SLUG_ALREADY_EXISTS
    delete:
      tags: [AdminCatalog]
      summary: Soft-delete category (sets isActive=false)
      security: [{ AdminBearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
        "409":
          description: CATEGORY_IN_USE

  /api/v1/admin/brands:
    get:
      tags: [AdminCatalog]
      summary: List brands (admin)
      security: [{ AdminBearerAuth: [] }]
      parameters:
        - in: query
          name: q
          required: false
          schema: { type: string }
        - in: query
          name: isActive
          required: false
          schema: { type: string, enum: [active, inactive, all], default: all }
        - in: query
          name: page
          required: false
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          required: false
          schema: { type: integer, default: 20, enum: [20, 50, 100] }
      responses:
        "200":
          description: OK
    post:
      tags: [AdminCatalog]
      summary: Create brand
      security: [{ AdminBearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                slug: { type: string }
                logo: { type: object, additionalProperties: true }
                isActive: { type: boolean }
      responses:
        "201":
          description: Created

  /api/v1/admin/brands/{id}:
    get:
      tags: [AdminCatalog]
      summary: Get brand (admin)
      security: [{ AdminBearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
    put:
      tags: [AdminCatalog]
      summary: Update brand
      security: [{ AdminBearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                slug: { type: string }
                logo: { type: object, nullable: true, additionalProperties: true }
                isActive: { type: boolean }
      responses:
        "200":
          description: OK
        "409":
          description: SLUG_ALREADY_EXISTS
    delete:
      tags: [AdminCatalog]
      summary: Soft-delete brand (sets isActive=false)
      security: [{ AdminBearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
        "409":
          description: BRAND_IN_USE

  /api/v1/admin/products:
    get:
      tags: [AdminCatalog]
      summary: List products (admin/employee read-only)
      security: [{ AdminBearerAuth: [] }]
      parameters:
        - in: query
          name: q
          required: false
          schema: { type: string }
        - in: query
          name: brandId
          required: false
          schema: { type: string }
        - in: query
          name: categoryId
          required: false
          schema: { type: string }
        - in: query
          name: isActive
          required: false
          schema: { type: string, enum: [active, inactive, all], default: all }
        - in: query
          name: lowStockThreshold
          required: false
          schema: { type: integer, default: 5, minimum: 0 }
        - in: query
          name: sort
          required: false
          schema:
            {
              type: string,
              enum:
                [
                  newest,
                  name_asc,
                  name_desc,
                  createdAt_asc,
                  createdAt_desc,
                  updatedAt_asc,
                  updatedAt_desc,
                  stockStatus_asc,
                  stockStatus_desc
                ],
              default: updatedAt_desc
            }
        - in: query
          name: page
          required: false
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          required: false
          schema: { type: integer, default: 20, enum: [20, 50, 100] }
      responses:
        "200":
          description: OK
        "400":
          description: INVALID_LIMIT | INVALID_SORT | INVALID_ID
    post:
      tags: [AdminCatalog]
      summary: Create product
      security: [{ AdminBearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, brandId, categoryId]
              properties:
                name: { type: string }
                slug: { type: string }
                brandId: { type: string }
                categoryId: { type: string }
                countryOfOrigin: { type: string }
                productType: { type: string }
                subcategory: { type: string }
                ingredients: { type: array, items: { type: string } }
                servingSuggestion: { type: string }
                agingInfo: { type: string }
                authenticityNote: { type: string }
                shortDescription: { type: string }
                tags: { type: array, items: { type: string } }
                description: { type: string }
                abv: { type: number }
                images: { type: array, items: { type: object, additionalProperties: true } }
                isActive: { type: boolean }
      responses:
        "201":
          description: Created

  /api/v1/admin/products/{id}:
    get:
      tags: [AdminCatalog]
      summary: Get product (admin/employee read-only)
      security: [{ AdminBearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      product:
                        type: object
                        properties:
                          id: { type: string }
                          name: { type: string }
                          slug: { type: string }
                          brandId: { type: string }
                          categoryId: { type: string }
                          countryOfOrigin: { type: string }
                          productType: { type: string }
                          subcategory: { type: string }
                          ingredients: { type: array, items: { type: string } }
                          servingSuggestion: { type: string }
                          agingInfo: { type: string }
                          authenticityNote: { type: string }
                          shortDescription: { type: string }
                          tags: { type: array, items: { type: string } }
                          description: { type: string }
                          abv: { type: number }
                          images: { type: array, items: { type: object, additionalProperties: true } }
                          isActive: { type: boolean }
                          createdAt: { type: string, format: date-time }
                          updatedAt: { type: string, format: date-time }
                      variants:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: string }
                            sku: { type: string }
                            label: { type: string }
                            volumeMl: { type: integer }
                            packSize: { type: integer }
                            price: { type: integer }
                            mrp: { type: integer }
                            isActive: { type: boolean }
                            createdAt: { type: string, format: date-time }
                            updatedAt: { type: string, format: date-time }
                            stock:
                              type: object
                              properties:
                                quantity: { type: integer }
                                reserved: { type: integer }
                                available: { type: integer }
    put:
      tags: [AdminCatalog]
      summary: Update product
      security: [{ AdminBearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                slug: { type: string }
                brandId: { type: string }
                categoryId: { type: string }
                countryOfOrigin: { type: string, nullable: true }
                productType: { type: string, nullable: true }
                subcategory: { type: string, nullable: true }
                ingredients: { type: array, items: { type: string } }
                servingSuggestion: { type: string, nullable: true }
                agingInfo: { type: string, nullable: true }
                authenticityNote: { type: string, nullable: true }
                shortDescription: { type: string, nullable: true }
                tags: { type: array, items: { type: string } }
                description: { type: string }
                abv: { type: number, nullable: true }
                images: { type: array, items: { type: object, additionalProperties: true } }
                isActive: { type: boolean }
      responses:
        "200":
          description: OK
        "409":
          description: SLUG_ALREADY_EXISTS
    delete:
      tags: [AdminCatalog]
      summary: Soft-delete product (sets isActive=false)
      security: [{ AdminBearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK

  /api/v1/admin/products/{id}/variants:
    post:
      tags: [AdminCatalog]
      summary: Create variant under product
      security: [{ AdminBearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sku, volumeMl, price]
              properties:
                sku: { type: string }
                label: { type: string }
                volumeMl: { type: integer }
                packSize: { type: integer, default: 1 }
                price: { type: integer }
                mrp: { type: integer }
                isActive: { type: boolean }
      responses:
        "201":
          description: Created
        "400":
          description: PRICE_GT_MRP | VALIDATION_ERROR
        "409":
          description: SKU_ALREADY_EXISTS | PRODUCT_INACTIVE
        "404":
          description: NOT_FOUND

  /api/v1/admin/variants/{variantId}:
    put:
      tags: [AdminCatalog]
      summary: Update variant
      security: [{ AdminBearerAuth: [] }]
      parameters:
        - in: path
          name: variantId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sku: { type: string }
                label: { type: string, nullable: true }
                volumeMl: { type: integer }
                packSize: { type: integer }
                price: { type: integer }
                mrp: { type: integer, nullable: true }
                isActive: { type: boolean }
      responses:
        "200":
          description: OK
        "400":
          description: PRICE_GT_MRP | VALIDATION_ERROR
        "409":
