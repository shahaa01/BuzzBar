  /api/v1/admin/orders/{id}:
    get:
      tags: [AdminOrders]
      summary: Get order operational detail read model
      description: |
        Returns the backend-computed operational read model for a single order.
        `actions` and `operational.allowedActions` are authoritative. Clients should render transition buttons from these descriptors and must not invent transitions locally.
      security: [{ AdminBearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      order:
                        type: object
                        properties:
                          id: { type: string }
                          orderNumber: { type: string }
                          status: { type: string, enum: [CREATED, KYC_PENDING_REVIEW, CONFIRMED, PACKING, READY_FOR_DISPATCH, OUT_FOR_DELIVERY, DELIVERED, CANCELLED] }
                          paymentMethod: { type: string, enum: [COD, WALLET] }
                          paymentStatus: { type: string, enum: [UNPAID, PENDING, PAID, FAILED] }
                          kycGateStatus: { type: string, enum: [PASS, REVIEW_REQUIRED, FAIL] }
                          kycStatusSnapshot: { type: string, enum: [not_started, pending, verified, rejected] }
                          subtotal: { type: integer }
                          discount: { type: integer }
                          deliveryFee: { type: integer }
                          total: { type: integer }
                          createdAt: { type: string, format: date-time }
                          updatedAt: { type: string, format: date-time }
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            productId: { type: string }
                            variantId: { type: string }
                            productName: { type: string }
                            brandName: { type: string, nullable: true }
                            sku: { type: string, nullable: true }
                            volumeMl: { type: integer }
                            packSize: { type: integer }
                            imageUrl: { type: string, nullable: true }
                            unitPrice: { type: integer }
                            qty: { type: integer }
                            lineTotal: { type: integer }
                      actions:
                        type: array
                        description: Backend action descriptors. Render only these actions in UI.
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              enum: [CONFIRM_ORDER, MOVE_TO_PACKING, MARK_READY_FOR_DISPATCH, MARK_OUT_FOR_DELIVERY, MARK_DELIVERED, CANCEL_ORDER]
                            label: { type: string }
                            tone: { type: string, enum: [default, destructive] }
                            to: { type: string, enum: [CONFIRMED, PACKING, READY_FOR_DISPATCH, OUT_FOR_DELIVERY, DELIVERED, CANCELLED] }
                            toStatus: { type: string, enum: [CONFIRMED, PACKING, READY_FOR_DISPATCH, OUT_FOR_DELIVERY, DELIVERED, CANCELLED] }
                            allowed: { type: boolean }
                            reasonCode:
                              type: string
                              nullable: true
                              enum: [KYC_REVIEW_REQUIRED, PAYMENT_NOT_PAID]
                      operational:
                        type: object
                        properties:
                          currentStatus: { type: string, enum: [CREATED, KYC_PENDING_REVIEW, CONFIRMED, PACKING, READY_FOR_DISPATCH, OUT_FOR_DELIVERY, DELIVERED, CANCELLED] }
                          allowedActions:
                            type: array
                            items:
                              type: object
                              properties:
                                id: { type: string, enum: [CONFIRM_ORDER, MOVE_TO_PACKING, MARK_READY_FOR_DISPATCH, MARK_OUT_FOR_DELIVERY, MARK_DELIVERED, CANCEL_ORDER] }
                                label: { type: string }
                                tone: { type: string, enum: [default, destructive] }
                                toStatus: { type: string, enum: [CONFIRMED, PACKING, READY_FOR_DISPATCH, OUT_FOR_DELIVERY, DELIVERED, CANCELLED] }
                                allowed: { type: boolean }
                          blockingConditions:
                            type: array
                            items:
                              type: string
                              enum: [KYC_REVIEW_REQUIRED, PAYMENT_NOT_PAID]
                      assignment:
                        type: object
                        properties:
                          assignedOperator:
                            type: object
                            nullable: true
                            properties:
                              id: { type: string }
                              email: { type: string }
                              role: { type: string, enum: [superadmin, admin, employee] }
                          assignedAt: { type: string, format: date-time, nullable: true }
                          history:
                            type: array
                            description: Most recent assignment audit entries first.
                            items:
                              type: object
                              properties:
                                id: { type: string }
                                actionId: { type: string, enum: [ASSIGN, REASSIGN, UNASSIGN] }
                                createdAt: { type: string, format: date-time }
                                actor:
                                  type: object
                                  nullable: true
                                  properties:
                                    id: { type: string }
                                    email: { type: string, nullable: true }
                                    role: { type: string, enum: [superadmin, admin, employee], nullable: true }
                                previousAssignedTo:
                                  type: object
                                  nullable: true
                                  properties:
                                    id: { type: string }
                                    email: { type: string, nullable: true }
                                    role: { type: string, enum: [superadmin, admin, employee], nullable: true }
                                assignedTo:
                                  type: object
                                  nullable: true
                                  properties:
                                    id: { type: string }
                                    email: { type: string, nullable: true }
                                    role: { type: string, enum: [superadmin, admin, employee], nullable: true }
        "404":
          description: NOT_FOUND

  /api/v1/admin/orders/{id}/status:
    patch:
      tags: [AdminOrders]
      summary: Legacy status update endpoint (compatibility wrapper)
      description: |
        Deprecated compatibility wrapper. New clients should use `POST /api/v1/admin/orders/{id}/transition`.
        This endpoint maps a status value onto the corresponding backend action id and may be removed in a future version.
      security: [{ AdminBearerAuth: [] }]
      deprecated: true
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
