                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [CREATED, KYC_PENDING_REVIEW, CONFIRMED, PACKING, READY_FOR_DISPATCH, OUT_FOR_DELIVERY, DELIVERED, CANCELLED]
                      actionId:
                        type: string
                        enum: [CONFIRM_ORDER, MOVE_TO_PACKING, MARK_READY_FOR_DISPATCH, MARK_OUT_FOR_DELIVERY, MARK_DELIVERED, CANCEL_ORDER]
        "409":
          description: ORDER_TRANSITION_INVALID | KYC_REVIEW_REQUIRED | PAYMENT_NOT_PAID | ORDER_ALREADY_DELIVERED

