              properties:
                status: { type: string }
      responses:
        "200":
          description: OK
          headers:
            Deprecation:
              schema: { type: string, example: "true" }
            Warning:
              schema: { type: string, example: '299 - "Deprecated: use POST /api/v1/admin/orders/:id/transition"' }
        "409":
          description: INVALID_STATUS_TRANSITION | KYC_REVIEW_REQUIRED | PAYMENT_NOT_PAID | ORDER_ALREADY_DELIVERED

  /api/v1/admin/orders/{id}/transition:
